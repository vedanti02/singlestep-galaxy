# Default hyperparameters for the StepOne-PVD pipeline.
# Override on the CLI or by passing `overrides=` to load_config().

data:
  root: /data/group_data/universedata/lagrangian_output_64
  snapshot: PART_009
  crop_size: 32        # D — region side; per-crop point count = D**3 = 32_768
  crop_overlap: 8      # d — buffer per face = d/2 = 4 voxels
  fields: [disp]       # use disp only; add "vel" to also predict velocity
  reader: numpy        # "numpy" or "hdf5"
  box_size: 1000.0     # Mpc/h (Quijote); only used by spectrum unit-conversions
  env_outside_mask: true  # mask env to outside-of-crop + add indicator channel

model:
  base_voxel: 32
  base_point: 128
  cond_dim:   256
  n_blocks:   4
  n_style:    5
  env_resolution: 64
  c_env: 4             # 3 disp + 1 indicator (set to 3 if env_outside_mask=false)

optim:
  lr: 2.0e-4
  weight_decay: 1.0e-5
  grad_clip: 1.0
  ema_decay: 0.999

train:
  epochs: 50
  batch_size: 4
  num_workers: 2
  val_every: 1
  ckpt_every: 5
  seed: 0
  device: cuda
  out_dir: runs/pvfm

flow:
  n_steps_train: 1     # midpoint not yet used; single t per batch
  n_steps_infer: 1     # 1 = "single step"; raise (e.g. 4) for quality
  lambda_voxel: 0.5
