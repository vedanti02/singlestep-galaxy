# Direct-regression v2: lower lr, stronger weight decay, no double-grad,
# random x_t input (forces use of conditioning), augmentation, fewer epochs.

data:
  root: /data/group_data/universedata/lagrangian_output_64
  snapshot: PART_009
  crop_size: 32
  crop_overlap: 8
  fields: [disp, vel]
  reader: numpy
  box_size: 1000.0
  env_outside_mask: true
  augment: true

model:
  base_voxel: 32
  base_point: 128
  cond_dim:   256
  n_blocks:   4
  n_style:    5
  env_resolution: 64
  c_env: 4

optim:
  lr: 1.0e-4
  weight_decay: 5.0e-4
  grad_clip: 1.0
  ema_decay: 0.999
  lr_schedule: warmup_cosine
  warmup_steps: 500

train:
  epochs: 12
  batch_size: 8
  num_workers: 8
  val_every: 1
  ckpt_every: 1
  seed: 0
  device: cuda
  out_dir: runs/pvfm_dv2

flow:
  mode: direct
  lambda_voxel: 0.0
