# Direct-regression v3: same recipe as v2 but with deeper trunk and
# slightly wider point head. Tests whether model capacity is the limit.

data:
  root: /data/group_data/universedata/lagrangian_output_64
  snapshot: PART_009
  crop_size: 32
  crop_overlap: 8
  fields: [disp, vel]
  reader: numpy
  box_size: 1000.0
  env_outside_mask: true
  augment: true

model:
  base_voxel: 32
  base_point: 192
  cond_dim:   256
  n_blocks:   8
  n_style:    5
  env_resolution: 64
  c_env: 4

optim:
  lr: 1.0e-4
  weight_decay: 5.0e-4
  grad_clip: 1.0
  ema_decay: 0.999
  lr_schedule: warmup_cosine
  warmup_steps: 1000

train:
  epochs: 12
  batch_size: 4
  num_workers: 8
  val_every: 1
  ckpt_every: 1
  seed: 0
  device: cuda
  out_dir: runs/pvfm_dv3

flow:
  mode: direct
  lambda_voxel: 0.0
