# lf_init + deeper trunk (n_blocks=6) + vel + augmentation.
# Combines the winning recipe with extra capacity.

data:
  root: /data/group_data/universedata/lagrangian_output_64
  snapshot: PART_009
  crop_size: 32
  crop_overlap: 8
  fields: [disp, vel]
  reader: numpy
  box_size: 1000.0
  env_outside_mask: true
  augment: true

model:
  base_voxel: 32
  base_point: 128
  cond_dim:   256
  n_blocks:   6
  n_style:    5
  env_resolution: 64
  c_env: 4

optim:
  lr: 2.0e-4
  weight_decay: 1.0e-5
  grad_clip: 1.0
  ema_decay: 0.999
  lr_schedule: warmup_cosine
  warmup_steps: 1000

train:
  epochs: 12
  batch_size: 4
  num_workers: 8
  val_every: 1
  ckpt_every: 1
  seed: 0
  device: cuda
  out_dir: runs/pvfm_lfinit_deep

flow:
  mode: lf_init
  lambda_voxel: 0.5
